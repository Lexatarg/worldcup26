<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  color:var(--fg);
  min-height:100vh;
  font-size:15px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

/* LIGHT MODE (default) */
:root{
  --bg:        #f8f7f5;
  --bg-2:      #ffffff;
  --card:      #ffffff;
  --card-2:    #f5f5f3;
  --muted:     #f5f5f4;
  --muted-2:   #eeeeec;
  --border:    #e8e6e3;
  --border-2:  #d4d2cf;
  --fg:        #1a1917;
  --fg-2:      #5c5855;
  --fg-3:      #9a9895;
  --green:     #16a34a;
  --green-s:   #f0fdf4;
  --green-b:   rgba(22,163,74,.2);
  --red:       #dc2626;
  --red-s:     #fef2f2;
  --red-b:     rgba(220,38,38,.2);
  --amber:     #b45309;
  --amber-s:   #fffbeb;
  --amber-b:   rgba(180,83,9,.18);
  --blue:      #1d4ed8;
  --blue-s:    #eff6ff;
  --blue-b:    rgba(29,78,216,.15);
  --rose:      #ea580c;
  --r:   10px;
  --r-sm: 6px;
  --hh:  52px;
  --th:  42px;
  --max: 700px;
  --sh:  0 1px 4px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --sh-sm: 0 1px 2px rgba(0,0,0,.05);
}

.app{display:flex;flex-direction:column;min-height:100vh}
.w{max-width:var(--max);margin:0 auto;width:100%;padding:0 16px}

/* ── HEADER ── */
.hdr{
  position:sticky;top:0;z-index:50;height:var(--hh);
  background:var(--bg);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
}
.hdr .w{height:100%;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:7px}
.brand-ico{width:22px;height:22px;flex-shrink:0;display:flex;align-items:center}
.brand-ico img{width:100%;height:100%;object-fit:contain;display:block}
.brand-name{font-size:14px;font-weight:700;letter-spacing:-.02em;color:var(--fg)}
.lang-tog{display:flex;background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:2px;gap:1px}
.lb{font-size:12px;font-weight:600;padding:3px 10px;border-radius:4px;color:var(--fg-3);transition:background .1s,color .1s;letter-spacing:.02em}
.lb.on{background:var(--card-2);color:var(--fg);box-shadow:var(--sh-sm)}

/* ── NAV ── */
.nav{
  background:var(--bg-2);
  border-bottom:1px solid var(--border);
  position:sticky;top:var(--hh);z-index:40;
}
.nav .w{display:flex;overflow-x:auto;scrollbar-width:none}
.nav .w::-webkit-scrollbar{display:none}
.nt{
  flex-shrink:0;height:var(--th);padding:0 14px;
  font-size:13px;font-weight:500;color:var(--fg-3);
  border-bottom:2px solid transparent;
  transition:color .1s,border-color .1s;white-space:nowrap;
  display:flex;align-items:center;
}
.nt.on{color:var(--fg);border-bottom-color:var(--fg)}
.nt:hover:not(.on){color:var(--fg-2)}

/* ── PAGE ── */
.pg{display:none;padding:20px 0 32px}
.pg.on{display:flex;flex-direction:column;flex:1 0 auto}
.ey{
  font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  color:var(--fg-3);margin-bottom:10px;
}
.ey.mt{margin-top:28px}

/* ── CALLOUT ── */
.callout{
  border-radius:var(--r);padding:12px 14px;
  margin-bottom:14px;display:flex;gap:10px;align-items:flex-start;
  border:1px solid;
}
.callout.amber{background:var(--amber-s);border-color:var(--amber-b)}
.callout.green{background:var(--green-s);border-color:var(--green-b)}
.callout-mark{font-size:12px;font-weight:700;flex-shrink:0;margin-top:2px}
.callout.amber .callout-mark{color:var(--amber)}
.callout.green .callout-mark{color:var(--green)}
.callout-title{font-size:13px;font-weight:600;margin-bottom:2px}
.callout.amber .callout-title{color:var(--amber)}
.callout.green .callout-title{color:var(--green)}
.callout-body{font-size:13px;color:var(--fg-2);line-height:1.5}

/* ═══════════════════════════════
   MATCH CARD
═══════════════════════════════ */
.mc{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  margin-bottom:8px;overflow:hidden;
  box-shadow:var(--sh-sm);
  transition:border-color .12s;
}
.mc:hover{border-color:var(--border-2)}
.mc.done{opacity:.55}
.mc-btn{width:100%;text-align:left;display:block;padding:0}
.mc-meta{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 15px 0;gap:8px;
}
.mc-time{font-size:11px;font-weight:500;color:var(--fg-3)}
.mc-time b{font-weight:600;color:var(--green)}

.bdg{
  display:inline-flex;align-items:center;gap:3px;
  font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  padding:2px 7px;border-radius:4px;border:1px solid;
  white-space:nowrap;flex-shrink:0;
}

/* TEAMS ROW */
.mc-teams{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  padding:12px 15px 10px;
  gap:8px;
}
.m-side{display:flex;align-items:center;gap:8px;min-width:0}
.m-side.away{justify-content:flex-end}
.m-flag{font-size:22px;line-height:1;flex-shrink:0}
.m-name{
  font-size:15px;font-weight:700;letter-spacing:-.02em;
  white-space:nowrap;
}
/* score chip */
.m-score{
  font-size:20px;font-weight:800;letter-spacing:.1em;
  font-variant-numeric:tabular-nums;
  background:rgba(255,255,255,.06);
  border:1px solid var(--border);
  border-radius:8px;
  padding:6px 14px;
  min-width:80px;text-align:center;
  flex-shrink:0;
  color:var(--fg);
}
.m-vs{
  font-size:12px;color:var(--fg-3);font-weight:500;
  text-align:center;padding:0 10px;flex-shrink:0;
}
.mc-foot{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 15px 12px;gap:8px;
}
.mc-sum{font-size:13px;color:var(--fg-2);flex:1;line-height:1.4;min-width:0}
.chev{
  width:16px;height:16px;flex-shrink:0;
  color:var(--fg-3);transition:transform .18s;
  display:flex;align-items:center;justify-content:center;
}
.mc.open .chev{transform:rotate(180deg)}

/* DETAIL PANEL */
.md{display:none;border-top:1px solid var(--border);padding:14px 15px}
.mc.open .md{display:block}
.dl{
  font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--fg-3);margin-bottom:8px;
}
.dl.mt{margin-top:14px}
.pb-w{margin-bottom:12px;margin-top:2px}
.pr{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.pr:last-child{margin-bottom:0}
.pr-n{font-size:13px;color:var(--fg-2);width:34%;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pr-fav{color:var(--fg);font-weight:600}
.pr-track{flex:1;height:6px;background:var(--muted-2,#eeeeec);border-radius:3px;overflow:hidden}
.pr-fill{display:block;height:100%;background:var(--fg-3);border-radius:3px}
.pr-fill-fav{background:var(--fg)}
.pr-pct{font-size:12px;color:var(--fg-3);width:38px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}

/* stake rows */
.sk{
  border:1px solid var(--border);border-radius:var(--r-sm);
  padding:11px 12px;margin-bottom:5px;
  background:rgba(255,255,255,.03);
}
.sk-h{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  margin-bottom:5px;
  gap:8px;
  flex-wrap:wrap;
}
.sk-n{font-size:13px;font-weight:700;flex-shrink:0}
.sk-v{
  font-size:11px;font-weight:600;letter-spacing:.02em;
  flex-shrink:0;
  word-break:break-word;
  max-width:100%;
}
.sk-w{font-size:13px;color:var(--fg-2);line-height:1.55}

/* context */
.ctx{
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:11px 12px;margin-top:7px;
}
.ctx-l{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-3);margin-bottom:3px}
.ctx-t{font-size:13px;color:var(--fg-2);line-height:1.55}

/* mini standings */
.mr{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border-radius:5px;font-size:13px;margin-bottom:2px}
.mr.hl{background:rgba(255,255,255,.04);border:1px solid var(--border)}
.ml{display:flex;align-items:center;gap:7px}
.mp{font-weight:700;font-variant-numeric:tabular-nums}

/* ═══════════════
   SCHEDULE
═══════════════ */
.dy{margin-bottom:6px}
.dy-btn{
  width:100%;text-align:left;
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:11px 14px;display:flex;align-items:center;justify-content:space-between;
  box-shadow:var(--sh-sm);cursor:pointer;transition:border-color .1s;
}
.dy.open .dy-btn{border-bottom-left-radius:0;border-bottom-right-radius:0}
.dy-btn:hover{border-color:var(--border-2)}
.dy-l{display:flex;align-items:center;gap:10px}
.dy-d{font-size:14px;font-weight:600;color:var(--fg)}
.dy-m{font-size:12px;color:var(--fg-3)}
.dy-body{
  display:none;background:var(--card);
  border:1px solid var(--border);border-top:none;
  border-bottom-left-radius:var(--r);border-bottom-right-radius:var(--r);
  overflow:hidden;
}
.dy.open .dy-body{display:block}

/* schedule row */
.sr{
  display:flex;align-items:center;
  padding:9px 14px;gap:8px;
  border-bottom:1px solid var(--border);
}
.sr:last-child{border-bottom:none}
.sr-t{font-size:11px;color:var(--fg-3);font-weight:500;width:52px;flex-shrink:0;white-space:nowrap}
.sr-teams{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;min-width:0}
.sr-fl{font-size:15px;line-height:1;flex-shrink:0}
.sr-tn{font-size:13px;font-weight:500;color:var(--fg-2);white-space:nowrap}
.sr-vs{font-size:11px;color:var(--fg-3);margin:0 2px}
.sr-right{flex-shrink:0;text-align:right;min-width:52px}
.sr-score{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--fg);letter-spacing:.04em}
.sr-prob{font-size:12px;color:var(--fg-3);font-weight:500}

/* ═══════════════
   STANDINGS
═══════════════ */
.gb{margin-bottom:8px}
.g-hdr{
  font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  color:var(--fg-3);padding:8px 13px;
  background:var(--card-2);
  border:1px solid var(--border);border-bottom:none;
  border-radius:var(--r) var(--r) 0 0;
}
.g-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:0 0 var(--r) var(--r);overflow:hidden;box-shadow:var(--sh-sm);
}
table.st{width:100%;border-collapse:collapse;table-layout:fixed}
table.st th{
  font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;
  color:var(--fg-3);text-align:right;padding:7px 8px 7px 0;
  border-bottom:1px solid var(--border);
  width:32px;
}
table.st th:first-child{text-align:left;padding-left:0;width:auto}
table.st td{font-size:13px;padding:9px 8px 9px 0;text-align:right;border-top:1px solid var(--border)}
table.st tbody tr:first-child td{border-top:none}
table.st td:first-child{padding-left:0}
.tc{display:flex;align-items:center}
.tc-r{font-size:11px;color:var(--fg-3);width:26px;text-align:center;flex-shrink:0}
.tc-b{width:2px;height:32px;flex-shrink:0;border-radius:1px}
.tc-n{padding-left:7px;font-weight:500;font-size:13px;white-space:nowrap;color:var(--fg)}
tr.p1 .tc-b,tr.p2 .tc-b{background:var(--green)}
tr.p3 .tc-b{background:var(--fg-3)}
tr.p4 .tc-b{background:var(--red)}
tr.p3 td,tr.p4 td{color:var(--fg-3)}
.td-pts{font-weight:700;color:var(--fg)}
tr.p3 .td-pts,tr.p4 .td-pts{color:var(--fg-3)}
.td-gd{color:var(--fg-3)}
.st-leg{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px}
.sl{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--fg-2)}
.sl-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ═══════════════════════
   BRACKET
═══════════════════════ */
.status-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:18px;box-shadow:var(--sh-sm)}
.status-section{margin-bottom:16px}
.status-section:last-of-type{margin-bottom:8px}
.status-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.status-count{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;background:var(--muted);border-radius:9px;font-size:10px;font-weight:600;color:var(--fg-2);letter-spacing:0}
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px 16px}
.status-team{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px;color:var(--fg)}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.status-fl{font-size:16px;line-height:1;flex-shrink:0}
.status-nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--fg-2)}
.status-note{font-size:12px;color:var(--fg-3);margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
@media(max-width:460px){.status-grid{grid-template-columns:1fr}}
.bracket-stage{margin-bottom:24px}
.bsl{
  font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--fg-3);margin-bottom:8px;
  display:flex;align-items:center;gap:8px;
}
.bsl::after{content:"";flex:1;height:1px;background:var(--border)}
.bmatches{display:flex;flex-direction:column;gap:4px}
.bm{background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;box-shadow:var(--sh-sm)}
.bm.tbd{opacity:.35}
.bm-inner{display:grid;grid-template-columns:1fr auto 1fr;align-items:stretch;min-height:50px}
.bm-t{display:flex;align-items:center;gap:6px;padding:9px 11px;font-size:13px;font-weight:600;min-width:0}
.bm-t.r{justify-content:flex-end;flex-direction:row-reverse}
.bm-t.win{background:var(--green-s)}
.bm-t.out{opacity:.38}
.bm-fl{font-size:17px;line-height:1;flex-shrink:0}
.bm-nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--fg)}
.bm-c{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:5px 9px;gap:1px;
  border-left:1px solid var(--border);border-right:1px solid var(--border);
  background:var(--card-2);min-width:60px;
}
.bm-sc{font-size:13px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:.05em;color:var(--fg)}
.bm-vs{font-size:9px;color:var(--fg-3);font-weight:500;letter-spacing:.05em;text-transform:uppercase}
.bm-date{font-size:10px;color:var(--fg-3);margin-top:1px}
.bm-tbd-txt{font-size:11px;color:var(--fg-3);font-style:italic;padding:9px 11px}

/* stage badge */
.sbdg{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;border:1px solid}

/* ═════════
   MORE
═════════ */
.more-grid{display:flex;flex-direction:column;gap:6px}
.ac{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--sh-sm)}
.ac-t{font-size:14px;font-weight:600;color:var(--fg);margin-bottom:6px}
.ac-b{font-size:13px;color:var(--fg-2);line-height:1.65}
.ac-b strong{color:var(--fg);font-weight:600}
.hs-steps{margin-top:7px;display:flex;flex-direction:column;gap:5px}
.hs-step{display:flex;align-items:flex-start;gap:9px;font-size:13px;color:var(--fg-2);line-height:1.5}
.hs-num{
  width:19px;height:19px;border-radius:50%;
  background:var(--card-2);border:1px solid var(--border-2);
  color:var(--fg-2);font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;
}
.plat{font-size:12px;font-weight:600;color:var(--fg-2);margin:12px 0 5px;letter-spacing:.02em}
.divider{border:none;border-top:1px solid var(--border);margin:10px 0}
.disc-box{background:var(--card-2);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.disc-l{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-3);margin-bottom:6px}
.disc-t{font-size:12px;color:var(--fg-3);line-height:1.65}

/* ── CELEBRATION ── */
.cel{display:none;position:fixed;inset:0;z-index:200;overflow:hidden;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.cel.on{display:flex}
.cel-bg{position:absolute;inset:0}
.cel-inner{position:relative;z-index:2;padding:32px 24px;display:flex;flex-direction:column;align-items:center}
.cel-trophy{font-size:88px;animation:spin 3s ease-in-out infinite;line-height:1;margin-bottom:12px}
@keyframes spin{0%{transform:rotate(-8deg) scale(1)}50%{transform:rotate(8deg) scale(1.09)}100%{transform:rotate(-8deg) scale(1)}}
.cel-flag{font-size:60px;line-height:1;margin-bottom:12px}
.cel-title{font-size:24px;font-weight:800;letter-spacing:-.03em;color:#fff;text-shadow:0 2px 16px rgba(0,0,0,.4);margin-bottom:4px}
.cel-name{font-size:18px;font-weight:700;color:rgba(255,255,255,.9);margin-bottom:6px}
.cel-sub{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:24px}
.cel-close{font-size:12px;color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.22);padding:7px 18px;border-radius:6px;background:rgba(0,0,0,.2);cursor:pointer}
#confetti-canvas{position:absolute;inset:0;pointer-events:none;z-index:1}

/* ── FOOTER ── */
footer{
  border-top:1px solid var(--border);padding:12px 0;
  text-align:center;font-size:12px;color:var(--fg-3);
  background:var(--bg-2);
}

/* ── RESPONSIVE ── */
@media(max-width:460px){
  :root{--max:100%}
  .w{padding:0 12px}
  .m-name{font-size:13px}
  .m-flag{font-size:19px}
  .m-score{font-size:17px;padding:5px 10px;min-width:66px}
  .bm-nm{display:none}
  .bm-fl{font-size:19px}
}
@media(max-width:360px){
  .m-name{font-size:12px}
  .m-flag{font-size:17px}
  .m-score{font-size:15px;padding:4px 8px;min-width:56px}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
  .cel-trophy{animation:none}
}

  sudden:{bg:"var(--red-s)",bc:"var(--red-b)",tc:"var(--red)",k:"pill_sudden"},
 };
 const c=m[type]||m.next;
 return'<span class="bdg" style="background:'+c.bg+';border-color:'+c.bc+';color:'+c.tc+'">'+t(c.k)+'</span>';
}

function probBar(p,hn,an){
 if(!p)return"";
 function row(name,pct,strong){
  return'<div class="pr"><span class="pr-n'+(strong?' pr-fav':'')+'">'+name+'</span>'
   +'<span class="pr-track"><span class="pr-fill'+(strong?' pr-fill-fav':'')+'" style="width:'+pct+'%"></span></span>'
   +'<span class="pr-pct'+(strong?' pr-fav':'')+'">'+pct+'%</span></div>';
 }
 const homeFav=p.h>=p.a;
 return'<div class="pb-w"><div class="dl">'+t("prob")+'</div>'
  +row(hn,p.h,homeFav)
  +row(t("draw"),p.d,false)
  +row(an,p.a,!homeFav)
  +'</div>';
}

function matchCard(m){
 const open=openCards.has(m.id);
 const timeStr=m.time[lang];
 const stakeLabel=m.done?t("means"):t("needs");
 const stakes=m.stakes.map(s=>
  '<div class="sk">'
  +'<div class="sk-h"><span class="sk-n">'+s.n+'</span>'
  +'<span class="sk-v" style="color:'+s.vc+'">'+s.v[lang]+'</span></div>'
  +'<p class="sk-w">'+s.w[lang]+'</p>'
  +'</div>'
 ).join("");
 const mini=m.mini.map(r=>
  '<div class="mr'+(r.inMatch?' hl':'')+'"><span class="ml">'+flag(r.f)+' '+r.n+'</span><span class="mp" style="color:'+(r.inMatch?'var(--fg)':'var(--fg-3)')+'">'+r.pts+' pts</span></div>'
 ).join("");
 return'<div class="mc'+(m.done?' done':'')+(open?' open':'')+'" id="mc'+m.id+'">'
  +'<button class="mc-btn" onclick="toggleCard('+m.id+')" aria-expanded="'+open+'">'
  +'<div class="mc-meta"><span class="mc-time">'+timeStr+'</span>'+pill(m.pill)+'</div>'
  +'<div class="mc-teams">'
  +'<div class="m-side"><span class="m-flag">'+flag(m.h.f)+'</span><span class="m-name">'+m.h.n+'</span></div>'
  +(m.done?'<span class="m-score">'+m.score+'</span>':'<span class="m-vs">vs</span>')
  +'<div class="m-side away"><span class="m-name">'+m.a.n+'</span><span class="m-flag">'+flag(m.a.f)+'</span></div>'
  +'</div>'
  +'<div class="mc-foot"><span class="mc-sum">'+m.sum[lang]+'</span><span class="chev">'+chev+'</span></div>'
  +'</button>'
  +'<div class="md">'+probBar(m.prob,m.h.n,m.a.n)
  +'<div class="dl'+(m.prob?' mt':'')+'">'+stakeLabel+'</div>'
  +stakes
  +'<div class="ctx"><div class="ctx-l">'+t("ctx_l")+'</div><p class="ctx-t">'+m.ctx[lang]+'</p></div>'
  +'<div class="dl mt">'+t("grp_st")+' \u2014 '+t("grp")+' '+m.grp+'</div>'
  +mini+'</div></div>';
}

function schedHTML(){
 return SCHED.map(day=>{
  const open=openDays.has(day.key);
  const isToday=!!day.today;
  const allDone=day.matches.every(m=>m.s==="result");
  const bSt=isToday?"background:var(--fg);border-color:var(--fg);color:var(--bg-2)":allDone?"background:var(--muted);border-color:var(--border);color:var(--fg-3)":"background:var(--muted);border-color:var(--border);color:var(--fg-3)";
  const bTxt=isToday?t("today_b"):allDone?t("past"):t("upcoming_b");
  const cnt=day.matches.length;
  const meta=lang==="es"?cnt+" partido"+(cnt>1?"s":""):cnt+" match"+(cnt>1?"es":"");
  const rows=day.matches.map(m=>{
   let right="";
   if(m.s==="result"){
    right='<span class="sr-right sr-score">'+m.score+'</span>';
   } else if(m.s==="live"){
    right='<span class="sr-right" style="color:var(--fg);font-weight:600">'+t("pill_live")+'</span>';
   } else if(m.prob){
    const fav=m.prob.h>=m.prob.a?flag(m.h)+" "+m.prob.h+"%":flag(m.a)+" "+m.prob.a+"%";
    right='<span class="sr-right sr-prob">'+fav+'</span>';
   }
   return'<div class="sr">'
    +'<span class="sr-t">'+m.time+'</span>'
    +'<div class="sr-teams"><span class="sr-fl">'+flag(m.h)+'</span><span class="sr-tn">'+m.h+'</span><span class="sr-vs">vs</span><span class="sr-fl">'+flag(m.a)+'</span><span class="sr-tn">'+m.a+'</span></div>'
    +right
    +'</div>';
  }).join("");
  return'<div class="dy'+(open?' open':'')+'">'
   +'<button class="dy-btn" onclick="toggleDay(\''+day.key+'\')">'
   +'<div class="dy-l"><span class="dy-d">'+day.date[lang]+'</span><span class="dy-m">'+meta+'</span></div>'
   +'<div style="display:flex;align-items:center;gap:8px"><span class="bdg" style="'+bSt+'">'+bTxt+'</span><span class="chev">'+chev+'</span></div>'
   +'</button><div class="dy-body">'+rows+'</div></div>';
 }).join("");
}

function standingsHTML(){
 return GROUPS.map(g=>
  '<div class="gb"><div class="g-hdr">'+t("grp")+' '+g.g+'</div>'
  +'<div class="g-card"><table class="st"><thead><tr>'
  +'<th></th><th>'+t("GP")+'</th><th>'+t("GW")+'</th><th>'+t("GD")+'</th><th>'+t("GL")+'</th><th>'+t("GGD")+'</th><th>'+t("GPTS")+'</th>'
  +'</tr></thead><tbody>'
  +g.teams.map(r=>'<tr class="p'+r.r+'"><td><div class="tc"><span class="tc-r">'+r.r+'</span><span class="tc-b"></span><span class="tc-n">'+flag(r.f)+' '+r.n[lang]+'</span></div></td><td>'+r.p+'</td><td>'+r.w+'</td><td>'+r.d+'</td><td>'+r.l+'</td><td class="td-gd">'+r.gd+'</td><td class="td-pts">'+r.pts+'</td></tr>').join("")
  +'</tbody></table></div></div>'
 ).join("");
}

function statusPillsHTML(){
 function teamItem(team,dot){
  return'<div class="status-team"><span class="status-dot" style="background:'+dot+'"></span><span class="status-fl">'+flag(team.f)+'</span><span class="status-nm">'+team.n[lang]+'</span></div>';
 }
 function section(label,teams,dot){
  return'<div class="status-section"><div class="status-label">'+label+' <span class="status-count">'+teams.length+'</span></div><div class="status-grid">'+teams.map(tm=>teamItem(tm,dot)).join("")+'</div></div>';
 }
 return'<div class="status-card">'
  +section(t("st_qualified"),STATUS.qualified,"var(--green)")
  +section(t("st_eliminated"),STATUS.eliminated,"var(--red)")
  +section(t("st_contention"),STATUS.contention,"var(--fg-3)")
  +'<p class="status-note">'+t("st_group_note")+'</p>'
  +'</div>';
}

function bracketHTML(){
 return BRACKET.map(stage=>{
  const hasDone=stage.matches.some(m=>m.s==="result");
  const allTbd=stage.matches.every(m=>m.s==="tbd"&&!m.h);
  const badge=hasDone?'<span class="sbdg" style="background:var(--green-s);border-color:var(--green-b);color:var(--green)">Done</span>'
   :allTbd?'<span class="sbdg" style="background:rgba(255,255,255,.04);border-color:var(--border);color:var(--fg-3)">'+t("tbd")+'</span>':"";
  const matches=stage.matches.map(m=>{
   const isTbd=!m.h;
   if(isTbd){
    return'<div class="bm tbd"><div class="bm-inner">'
     +'<div class="bm-t bm-tbd-txt">'+t("tbd")+'</div>'
     +'<div class="bm-c"><span class="bm-vs">vs</span><span class="bm-date">'+m.date[lang]+'</span></div>'
     +'<div class="bm-t r bm-tbd-txt">'+t("tbd")+'</div>'
     +'</div></div>';
   }
   const hCls="bm-t"+(m.winner===m.h?" win":m.loser===m.h?" out":"");
   const aCls="bm-t r"+(m.winner===m.a?" win":m.loser===m.a?" out":"");
   return'<div class="bm"><div class="bm-inner">'
    +'<div class="'+hCls+'"><span class="bm-fl">'+flag(m.h)+'</span><span class="bm-nm">'+m.hn+'</span></div>'
    +'<div class="bm-c">'+(m.s==="result"?'<span class="bm-sc">'+m.score+'</span>':'<span class="bm-vs">vs</span>')+'<span class="bm-date">'+m.date[lang]+'</span></div>'
    +'<div class="'+aCls+'"><span class="bm-fl">'+flag(m.a)+'</span><span class="bm-nm">'+m.an+'</span></div>'
    +'</div></div>';
  }).join("");
  return'<div class="bracket-stage"><div class="bsl">'+stage.stage[lang]+'&nbsp;'+badge+'</div><div class="bmatches">'+matches+'</div></div>';
 }).join("");
}

function stepsHTML(arr){return arr.map((s,i)=>'<div class="hs-step"><span class="hs-num">'+(i+1)+'</span><span>'+s+'</span></div>').join("");}

function render(){
 document.getElementById("bn").textContent=t("brand");
 document.querySelectorAll(".lb").forEach(b=>b.classList.toggle("on",b.dataset.lang===lang));
 document.querySelectorAll(".nt").forEach((n,i)=>n.textContent=t("tabs")[i]);
 document.getElementById("t-ey").textContent=t("today_ey");
 document.getElementById("cl-t").textContent=t("cl_t");
 document.getElementById("cl-b").textContent=t("cl_b");
 document.getElementById("m-list").innerHTML=MATCHES.map(matchCard).join("");
 document.getElementById("sc-ey").textContent=t("sched_ey");
 document.getElementById("sc-list").innerHTML=schedHTML();
 document.getElementById("st-ey").textContent=t("st_ey");
 document.getElementById("leg1").textContent=t("leg1");
 document.getElementById("leg2").textContent=t("leg2");
 document.getElementById("leg3").textContent=t("leg3");
 document.getElementById("st-list").innerHTML=standingsHTML();
 document.getElementById("br-ey").textContent=t("bracket_ey");
 document.getElementById("br-list").innerHTML=statusPillsHTML()+bracketHTML();
 document.getElementById("more-ey").textContent=t("more_ey");
 [["q_intro","a_intro"],["q_what","a_what"],["q_how","a_how"],["q_update","a_update"]].slice(1).forEach(([q,a],i)=>{
  document.getElementById("mq"+(i+1)).textContent=t(q);
  document.getElementById("ma"+(i+1)).innerHTML=t(a);
 });
 document.getElementById("hs-title").textContent=t("hs_title");
 document.getElementById("hs-ios").textContent=t("hs_ios");
 document.getElementById("hs-ios-s").innerHTML=stepsHTML(t("ios_steps"));
 document.getElementById("hs-and").textContent=t("hs_and");
 document.getElementById("hs-and-s").innerHTML=stepsHTML(t("and_steps"));
 document.getElementById("disc-t").textContent=t("disc_t");
 document.getElementById("disc-b").innerHTML=t("disc_b");
 document.getElementById("cel-title").textContent=t("cel_title");
 document.getElementById("cel-sub").textContent=t("cel_sub");
 document.getElementById("cel-close").textContent=t("cel_close");
 document.getElementById("ft").textContent=t("footer");
 if(CFG.tournamentOver&&CFG.winner)showCelebration();
}
function setLang(l){lang=l;document.documentElement.lang=l;render();}
function toggleCard(id){
 openCards.has(id)?openCards.delete(id):openCards.add(id);
 const c=document.getElementById("mc"+id);
 c.classList.toggle("open",openCards.has(id));
 c.querySelector(".mc-btn").setAttribute("aria-expanded",openCards.has(id));
}
function toggleDay(k){openDays.has(k)?openDays.delete(k):openDays.add(k);render();}
function showTab(n){
 document.querySelectorAll(".pg").forEach(p=>p.classList.remove("on"));
 document.querySelectorAll(".nt").forEach(t=>t.classList.remove("on"));
 document.getElementById("pg-"+n).classList.add("on");
 document.querySelector('.nt[data-tab="'+n+'"]').classList.add("on");
}
function showCelebration(){
 const w=CFG.winner;if(!w)return;
 document.getElementById("cel").classList.add("on");
 document.getElementById("cel-flag").textContent=w.flag;
 document.getElementById("cel-name").textContent=lang==="es"?w.nameEs:w.name;
 document.getElementById("cel-bg").style.background="linear-gradient(135deg,"+w.color1+" 0%,"+w.color2+" 50%,"+w.color1+" 100%)";
 startConfetti(w.color1,w.color2);
}
function hideCelebration(){document.getElementById("cel").classList.remove("on");stopConfetti();}
let confettiAnim=null,confettiPieces=[];
function startConfetti(c1,c2){
 const cv=document.getElementById("confetti-canvas"),ctx=cv.getContext("2d");
 cv.width=window.innerWidth;cv.height=window.innerHeight;confettiPieces=[];
 const cols=[c1,c2,"#fff","#ffd700"];
 for(let i=0;i<150;i++)confettiPieces.push({x:Math.random()*cv.width,y:Math.random()*cv.height-cv.height,w:Math.random()*10+5,h:Math.random()*5+3,color:cols[Math.floor(Math.random()*cols.length)],rot:Math.random()*360,spd:Math.random()*3+1.5,wob:Math.random()*3-1.5,op:Math.random()*.4+.6});
 (function draw(){ctx.clearRect(0,0,cv.width,cv.height);confettiPieces.forEach(p=>{p.y+=p.spd;p.x+=p.wob;p.rot+=2;if(p.y>cv.height){p.y=-20;p.x=Math.random()*cv.width;}ctx.save();ctx.globalAlpha=p.op;ctx.translate(p.x+p.w/2,p.y+p.h/2);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();});confettiAnim=requestAnimationFrame(draw);})();
}
function stopConfetti(){if(confettiAnim)cancelAnimationFrame(confettiAnim);document.getElementById("confetti-canvas").getContext("2d").clearRect(0,0,window.innerWidth,window.innerHeight);}
window.addEventListener("DOMContentLoaded",render);
</script>
